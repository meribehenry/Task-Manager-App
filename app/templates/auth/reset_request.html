{% extends "base.html" %}
{% block content %}
    <h1>Reset Password</h1>

    <section>
        <form action="" method="POST">
            {{ form.hidden_tag( )}}

            <div>
                {{ form.email.label() }}
                {{ form.email() }}

                {% if form.email.errors %}
                    {% for error in form.email.errors%}
                        <small style="color: red;">{{ error }}</small><br>
                    {% endfor %}
                {% endif %}
                <br><br>
            </div>
            <div>
                {{ form.submit() }}
                <br><br>
            </div>
        </form>
    </section>
{% endblock %}
